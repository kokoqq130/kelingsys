name: Deploy Share Site To EdgeOne

on:
  workflow_dispatch:
    inputs:
      deploy_env:
        description: EdgeOne Pages deployment environment
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: app/frontend/pnpm-lock.yaml

      - name: Install backend dependencies
        working-directory: app/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install frontend dependencies
        working-directory: app/frontend
        run: pnpm install --frozen-lockfile

      - name: Build static share bundle
        working-directory: app/frontend
        run: pnpm run build:share

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: edgeone-share-dist
          path: app/frontend/dist

      - name: Install EdgeOne CLI
        if: ${{ secrets.EDGEONE_API_TOKEN != '' && vars.EDGEONE_PROJECT_NAME != '' }}
        run: npm install -g edgeone

      - name: Deploy to EdgeOne Pages
        if: ${{ secrets.EDGEONE_API_TOKEN != '' && vars.EDGEONE_PROJECT_NAME != '' }}
        working-directory: app/frontend
        env:
          EDGEONE_API_TOKEN: ${{ secrets.EDGEONE_API_TOKEN }}
          EDGEONE_PROJECT_NAME: ${{ vars.EDGEONE_PROJECT_NAME }}
        run: |
          edgeone pages deploy ./dist \
            -n "$EDGEONE_PROJECT_NAME" \
            -e "${{ inputs.deploy_env }}" \
            -t "$EDGEONE_API_TOKEN"
