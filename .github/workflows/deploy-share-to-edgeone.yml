name: Deploy Share Site To EdgeOne

on:
  workflow_dispatch:
    inputs:
      deploy_env:
        description: EdgeOne Pages deployment environment
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production
      project_name:
        description: EdgeOne Pages project name
        required: true
        default: kelingsys-share
        type: string

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      EDGEONE_API_TOKEN: ${{ secrets.EDGEONE_API_TOKEN }}
      EDGEONE_PROJECT_NAME: ${{ inputs.project_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: app/frontend/pnpm-lock.yaml

      - name: Install backend dependencies
        working-directory: app/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install frontend dependencies
        working-directory: app/frontend
        run: pnpm install --frozen-lockfile

      - name: Build static share bundle
        working-directory: app/frontend
        env:
          BACKEND_PYTHON: python
        run: pnpm run build:share

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: edgeone-share-dist
          path: app/frontend/dist

      - name: Validate EdgeOne configuration
        run: |
          test -n "$EDGEONE_API_TOKEN"
          test -n "$EDGEONE_PROJECT_NAME"

      - name: Deploy to EdgeOne Pages
        id: deploy
        working-directory: app/frontend
        run: |
          set +e
          DEPLOY_OUTPUT=$(npx --yes edgeone pages deploy ./dist -n "$EDGEONE_PROJECT_NAME" -e "${{ inputs.deploy_env }}" -t "$EDGEONE_API_TOKEN" 2>&1)
          DEPLOY_EXIT_CODE=$?
          set -e
          echo "$DEPLOY_OUTPUT"

          if [ "$DEPLOY_EXIT_CODE" -ne 0 ]; then
            exit "$DEPLOY_EXIT_CODE"
          fi

          DEPLOY_URL=$(echo "$DEPLOY_OUTPUT" | grep "EDGEONE_DEPLOY_URL=" | cut -d'=' -f2- || true)
          PROJECT_ID=$(echo "$DEPLOY_OUTPUT" | grep "EDGEONE_PROJECT_ID=" | cut -d'=' -f2- || true)

          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "project_id=$PROJECT_ID" >> "$GITHUB_OUTPUT"

      - name: Write deployment summary
        if: ${{ steps.deploy.outputs.deploy_url != '' }}
        run: |
          echo "## EdgeOne Pages 部署完成" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- 部署环境：${{ inputs.deploy_env }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- 项目名称：$EDGEONE_PROJECT_NAME" >> "$GITHUB_STEP_SUMMARY"
          echo "- 项目 ID：${{ steps.deploy.outputs.project_id }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- 预览链接：${{ steps.deploy.outputs.deploy_url }}" >> "$GITHUB_STEP_SUMMARY"
